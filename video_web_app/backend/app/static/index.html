<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Web App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <h1>ABREARCH WEB</h1>
        <p>Explorer de videos en red local</p>
      </div>
      <div class="top-actions">
        <input id="tokenInput" type="password" placeholder="Token" />
        <input id="searchInput" type="search" placeholder="Buscar en carpeta actual..." />
        <button id="refreshBtn">Refrescar</button>
        <button id="logBtn">Log</button>
      </div>
    </header>

    <section class="filters">
      <button id="filterAll" class="filter-btn active">Todos</button>
      <button id="filterFav" class="filter-btn">Favoritos</button>
      <button id="filterUnseen" class="filter-btn">Sin revisar</button>
      <button id="filterSeen" class="filter-btn">- Vistos</button>
      <button id="filterMostViews" class="filter-btn">+ Vistos</button>
      <button id="filterMostTime" class="filter-btn">+ Tiempo</button>
      <button id="filterHeavy" class="filter-btn">Pesados</button>
      <label class="recursive-opt">
        <input id="recursiveToggle" type="checkbox" checked />
        Incluir subcarpetas
      </label>
    </section>

    <section class="explorer">
      <aside class="tree-panel">
        <div class="panel-title">Carpetas</div>
        <div id="folderTree" class="folder-tree"></div>
      </aside>

      <section class="content-panel">
        <div class="content-top">
          <div class="table-head">
            <span>Nombre</span>
            <span>Vistas</span>
            <span>Tiempo</span>
            <span>MB</span>
            <span>Visto</span>
            <span>Fav</span>
            <span>#</span>
          </div>
          <div id="videoTable" class="video-table"></div>
        </div>

        <div class="content-bottom">
          <div class="player-box">
            <h2 id="selectedTitle">Selecciona un video</h2>
            <video id="videoPlayer" controls playsinline preload="metadata"></video>
            <p id="selectedMeta" class="meta"></p>
          </div>
          <div class="actions-box">
            <button id="playBtn" class="state-btn" disabled>Reproducir</button>
            <button id="favBtn" class="state-btn" disabled>Favorito</button>
            <button id="watchedBtn" class="state-btn" disabled>Marcar visto</button>
            <div class="counter">Videos: <span id="countBadge">0</span></div>
            <div id="statusLine" class="status-line"></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="logModal" class="log-modal hidden">
    <div class="log-dialog">
      <div class="log-header">
        <h3>Log del programa</h3>
        <button id="closeLogBtn">Cerrar</button>
      </div>
      <pre id="logContent" class="log-content"></pre>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
